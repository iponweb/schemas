apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: nodeclaims.karpenter.sh
spec:
  group: karpenter.sh
  names:
    categories:
    - karpenter
    kind: NodeClaim
    listKind: NodeClaimList
    plural: nodeclaims
    singular: nodeclaim
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.labels.node\.kubernetes\.io/instance-type
      name: Type
      type: string
    - jsonPath: .metadata.labels.karpenter\.sh/capacity-type
      name: Capacity
      type: string
    - jsonPath: .metadata.labels.topology\.kubernetes\.io/zone
      name: Zone
      type: string
    - jsonPath: .status.nodeName
      name: Node
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - jsonPath: .status.imageID
      name: ImageID
      priority: 1
      type: string
    - jsonPath: .status.providerID
      name: ID
      priority: 1
      type: string
    - jsonPath: .metadata.labels.karpenter\.sh/nodepool
      name: NodePool
      priority: 1
      type: string
    - jsonPath: .spec.nodeClassRef.name
      name: NodeClass
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=="Drifted")].status
      name: Drifted
      priority: 1
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: NodeClaim is the Schema for the NodeClaims API
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation
              of an object.

              Servers should convert recognized schemas to the latest internal value,
              and

              may reject unrecognized values.

              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this
              object represents.

              Servers may infer this from the endpoint the client submits requests
              to.

              Cannot be updated.

              In CamelCase.

              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
            type: string
          metadata:
            type: object
          spec:
            description: NodeClaimSpec describes the desired state of the NodeClaim
            properties:
              expireAfter:
                default: 720h
                description: 'ExpireAfter is the duration the controller will wait

                  before terminating a node, measured from when the node is created.
                  This

                  is useful to implement features like eventually consistent node
                  upgrade,

                  memory leak protection, and disruption testing.'
                pattern: ^(([0-9]+(s|m|h))+|Never)$
                type: string
              nodeClassRef:
                description: NodeClassRef is a reference to an object that defines
                  provider specific configuration
                properties:
                  group:
                    description: API version of the referent
                    pattern: ^[^/]*$
                    type: string
                    x-kubernetes-validations:
                    - message: group may not be empty
                      rule: self != ''
                  kind:
                    description: 'Kind of the referent; More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds"'
                    type: string
                    x-kubernetes-validations:
                    - message: kind may not be empty
                      rule: self != ''
                  name:
                    description: 'Name of the referent; More info: http://kubernetes.io/docs/user-guide/identifiers#names'
                    type: string
                    x-kubernetes-validations:
                    - message: name may not be empty
                      rule: self != ''
                required:
                - group
                - kind
                - name
                type: object
              requirements:
                description: Requirements are layered with GetLabels and applied to
                  every node.
                items:
                  description: 'A node selector requirement with min values is a selector
                    that contains values, a key, an operator that relates the key
                    and values

                    and minValues that represent the requirement to have at least
                    that many values.'
                  properties:
                    key:
                      description: The label key that the selector applies to.
                      type: string
                    minValues:
                      description: 'This field is ALPHA and can be dropped or replaced
                        at any time

                        MinValues is the minimum number of unique values required
                        to define the flexibility of the specific requirement.'
                      maximum: 50
                      minimum: 1
                      type: integer
                    operator:
                      description: 'Represents a key''s relationship to a set of values.

                        Valid operators are In, NotIn, Exists, DoesNotExist. Gt, and
                        Lt.'
                      type: string
                    values:
                      description: 'An array of string values. If the operator is
                        In or NotIn,

                        the values array must be non-empty. If the operator is Exists
                        or DoesNotExist,

                        the values array must be empty. If the operator is Gt or Lt,
                        the values

                        array must have a single element, which will be interpreted
                        as an integer.

                        This array is replaced during a strategic merge patch.'
                      items:
                        type: string
                      type: array
                      x-kubernetes-list-type: atomic
                  required:
                  - key
                  - operator
                  type: object
                maxItems: 100
                type: array
                x-kubernetes-validations:
                - message: requirements with operator 'In' must have a value defined
                  rule: 'self.all(x, x.operator == ''In'' ? x.values.size() != 0 :
                    true)'
                - message: requirements operator 'Gt' or 'Lt' must have a single positive
                    integer value
                  rule: 'self.all(x, (x.operator == ''Gt'' || x.operator == ''Lt'')
                    ? (x.values.size() == 1 && int(x.values[0]) >= 0) : true)'
                - message: requirements with 'minValues' must have at least that many
                    values specified in the 'values' field
                  rule: 'self.all(x, (x.operator == ''In'' && has(x.minValues)) ?
                    x.values.size() >= x.minValues : true)'
              resources:
                description: Resources models the resource requirements for the NodeClaim
                  to launch
                properties:
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: Requests describes the minimum required resources
                      for the NodeClaim to launch
                    type: object
                type: object
              startupTaints:
                description: 'StartupTaints are taints that are applied to nodes upon
                  startup which are expected to be removed automatically

                  within a short period of time, typically by a DaemonSet that tolerates
                  the taint. These are commonly used by

                  daemonsets to allow initialization and enforce startup ordering.  StartupTaints
                  are ignored for provisioning

                  purposes in that pods are not required to tolerate a StartupTaint
                  in order to have nodes provisioned for them.'
                items:
                  description: 'The node this Taint is attached to has the "effect"
                    on

                    any pod that does not tolerate the Taint.'
                  properties:
                    effect:
                      description: 'Required. The effect of the taint on pods

                        that do not tolerate the taint.

                        Valid effects are NoSchedule, PreferNoSchedule and NoExecute.'
                      type: string
                    key:
                      description: Required. The taint key to be applied to a node.
                      type: string
                    timeAdded:
                      description: TimeAdded represents the time at which the taint
                        was added.
                      format: date-time
                      type: string
                    value:
                      description: The taint value corresponding to the taint key.
                      type: string
                  required:
                  - effect
                  - key
                  type: object
                type: array
              taints:
                description: Taints will be applied to the NodeClaim's node.
                items:
                  description: 'The node this Taint is attached to has the "effect"
                    on

                    any pod that does not tolerate the Taint.'
                  properties:
                    effect:
                      description: 'Required. The effect of the taint on pods

                        that do not tolerate the taint.

                        Valid effects are NoSchedule, PreferNoSchedule and NoExecute.'
                      type: string
                    key:
                      description: Required. The taint key to be applied to a node.
                      type: string
                    timeAdded:
                      description: TimeAdded represents the time at which the taint
                        was added.
                      format: date-time
                      type: string
                    value:
                      description: The taint value corresponding to the taint key.
                      type: string
                  required:
                  - effect
                  - key
                  type: object
                type: array
              terminationGracePeriod:
                description: 'TerminationGracePeriod is the maximum duration the controller
                  will wait before forcefully deleting the pods on a node, measured
                  from when deletion is first initiated.


                  Warning: this feature takes precedence over a Pod''s terminationGracePeriodSeconds
                  value, and bypasses any blocked PDBs or the karpenter.sh/do-not-disrupt
                  annotation.


                  This field is intended to be used by cluster administrators to enforce
                  that nodes can be cycled within a given time period.

                  When set, drifted nodes will begin draining even if there are pods
                  blocking eviction. Draining will respect PDBs and the do-not-disrupt
                  annotation until the TGP is reached.


                  Karpenter will preemptively delete pods so their terminationGracePeriodSeconds
                  align with the node''s terminationGracePeriod.

                  If a pod would be terminated without being granted its full terminationGracePeriodSeconds
                  prior to the node timeout,

                  that pod will be deleted at T = node timeout - pod terminationGracePeriodSeconds.


