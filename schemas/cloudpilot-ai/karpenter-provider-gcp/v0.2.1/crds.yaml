                          This field is intended to be used by cluster administrators
                          to enforce that nodes can be cycled within a given time
                          period.

                          When set, drifted nodes will begin draining even if there
                          are pods blocking eviction. Draining will respect PDBs and
                          the do-not-disrupt annotation until the TGP is reached.


