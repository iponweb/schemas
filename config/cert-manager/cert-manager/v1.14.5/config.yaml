version: "v1.14.5"
repository: "github.com/cert-manager/cert-manager"

openapi_gen_packages:
  - "github.com/cert-manager/cert-manager/pkg/apis/certmanager/v1"
  - "github.com/cert-manager/cert-manager/pkg/apis/acme/v1"
  - "github.com/cert-manager/cert-manager/pkg/apis/meta/v1"
  - "k8s.io/api/core/v1"
  - "k8s.io/apiextensions-apiserver/pkg/apis/apiextensions/v1"
  - "k8s.io/apimachinery/pkg/apis/meta/v1"
  - "k8s.io/apimachinery/pkg/runtime"
  - "k8s.io/apimachinery/pkg/version"
  - "sigs.k8s.io/gateway-api/apis/v1"

go_dependencies:
  k8s.io/apimachinery: "v0.35.2"
  k8s.io/apiserver: "v0.35.2"
  k8s.io/kube-openapi: "v0.0.0-20260304202019-5b3e3fdb0acf"

kubernetes_swagger_url: "https://raw.githubusercontent.com/kubernetes/kubernetes/v1.35.0/api/openapi-spec/swagger.json"
title: "cert-manager CRD OpenAPI"

crd_names:
  - "github.com/cert-manager/cert-manager/pkg/apis/acme/v1.Challenge"
  - "github.com/cert-manager/cert-manager/pkg/apis/acme/v1.Order"
  - "github.com/cert-manager/cert-manager/pkg/apis/certmanager/v1.Certificate"
  - "github.com/cert-manager/cert-manager/pkg/apis/certmanager/v1.CertificateRequest"
  - "github.com/cert-manager/cert-manager/pkg/apis/certmanager/v1.ClusterIssuer"
  - "github.com/cert-manager/cert-manager/pkg/apis/certmanager/v1.Issuer"

crd_path: "deploy/crds"

host_conversion_rules:
  "github.com/cert-manager/cert-manager/pkg/apis/acme": "acme.cert-manager.io"
  "github.com/cert-manager/cert-manager": "cert-manager.io"
